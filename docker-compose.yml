services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-koha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-koha}
      POSTGRES_DB: ${POSTGRES_DB:-koha_wiki}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-koha}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata: {}
