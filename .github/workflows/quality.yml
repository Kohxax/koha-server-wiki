name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: koha
          POSTGRES_PASSWORD: koha
          POSTGRES_DB: koha_wiki_test
        options: >-
          --health-cmd "pg_isready -U koha -d koha_wiki_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
        ports: [5432:5432]
    env:
      DATABASE_URL: postgres://koha:koha@localhost:5432/koha_wiki_test
      TEST_DATABASE_URL: postgres://koha:koha@localhost:5432/koha_wiki_test
      NUXT_SESSION_PASSWORD: test-session-password-at-least-32-characters
      NUXT_DEV_AUTH_BYPASS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm db:migrate
      - run: pnpm test:integration
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: pnpm build
      - run: docker build .
