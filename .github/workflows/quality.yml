name: Quality

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'

jobs:
  test:
    runs-on: ubuntu-latest
    concurrency:
      group: quality-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: koha
          POSTGRES_PASSWORD: koha
          POSTGRES_DB: koha_wiki_test
        options: >-
          --health-cmd "pg_isready -U koha -d koha_wiki_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
        ports: [5432:5432]
    env:
      DATABASE_URL: postgres://koha:koha@localhost:5432/koha_wiki_test
      TEST_DATABASE_URL: postgres://koha:koha@localhost:5432/koha_wiki_test
      NUXT_SESSION_PASSWORD: test-session-password-at-least-32-characters
      NUXT_DEV_AUTH_BYPASS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm db:migrate
      - run: pnpm test:integration
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: pnpm build
      - run: docker build .

  deploy:
    name: Deploy production
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    env:
      DEPLOY_PATH: ${{ vars.PRODUCTION_DEPLOY_PATH }}
    steps:
      - name: Verify deployment checkout
        run: |
          test -n "$DEPLOY_PATH"
          test -f "$DEPLOY_PATH/docker-compose.yml"

      - name: Pull latest code
        run: git -C "$DEPLOY_PATH" pull --ff-only origin main

      - name: Build and restart containers
        working-directory: ${{ vars.PRODUCTION_DEPLOY_PATH }}
        run: docker compose --profile prod up --build --detach --remove-orphans

      - name: Clean up dangling images
        run: docker image prune --force
