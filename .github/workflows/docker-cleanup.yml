name: Docker Cleanup

on:
  schedule:
    - cron: '17 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-docker-cleanup
  cancel-in-progress: false

jobs:
  prune:
    name: Prune unused Docker data
    runs-on: self-hosted
    environment: production
    steps:
      - name: Remove unused Docker data
        run: docker system prune --all --force
